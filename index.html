<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anity Gravity</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top left, #2e1065, #000000);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 90%;
      max-width: 480px;
      height: 85vh;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      overflow: hidden;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      background: linear-gradient(to right, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bot-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #075985, #4c1d95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar {
      width: 6px;
    }
    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .message {
      max-width: 85%;
      animation: fadeIn 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .message.user {
      align-self: flex-end;
    }

    .message.ai {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .input-area {
      padding: 16px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .upload-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    
    .upload-btn svg {
      fill: #38bdf8;
      width: 24px;
      height: 24px;
      transition: all 0.3s;
    }

    .upload-btn:hover svg {
      transform: scale(1.1);
      fill: #ec4899;
    }

    input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 12px 20px;
      color: white;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: #a855f7;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
    }

    button svg {
      fill: white;
      width: 20px;
      height: 20px;
    }

    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      height: 20px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #a855f7;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <div class="chat-container">
    <div class="header">
      <div class="bot-avatar">⚛️</div>
      <h2>Anity Gravity</h2>
      <span style="font-size: 0.75rem; color: #94a3b8; font-style: italic; margin-left: auto;">Defying Expectations</span>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message ai">
        <div class="bubble">Greetings, curious mind! I'm Anity Gravity, your guide through the wonders of the universe. What cosmic mystery shall we explore today?</div>
      </div>
    </div>

    <div class="input-area">
      <input type="file" id="pdfUpload" accept=".pdf" style="display: none;" onchange="uploadPdf()" />
      <button class="upload-btn" onclick="document.getElementById('pdfUpload').click()">
        <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 015 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 005 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
      </button>
      <input type="text" id="msg" placeholder="Ask anything..." onkeypress="handleKey(event)" />
      <button onclick="sendMsg()">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // Store session globally
    let userSession = localStorage.getItem('brainy_session_id') || null;

    async function sendMsg() {
      let inputField = document.getElementById("msg");
      let message = inputField.value.trim();
      
      if (!message) return;

      // Clear input
      inputField.value = "";
      
      // Add user's message
      addMessage(message, "user");

      // Show typing indicator
      let loadingId = addTypingIndicator();

      try {
        let res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ 
            message: message,
            session_id: userSession
          })
        });

        if (!res.ok) throw new Error("Network issue");

        let data = await res.json();
        
        // Store session ID
        if (data.session_id && !userSession) {
          userSession = data.session_id;
          localStorage.setItem('brainy_session_id', userSession);
        }
        
        // Remove typing indicator and add AI response
        removeMessage(loadingId);
        addMessage(data.reply, "ai");
        
      } catch (error) {
        removeMessage(loadingId);
        addMessage("⚠️ Oops! Something went wrong.", "ai");
      }
    }

    function addMessage(text, sender) {
      let chatBox = document.getElementById("chatBox");
      
      let msgDiv = document.createElement("div");
      msgDiv.className = `message ${sender}`;
      
      let bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = sender === "ai" ? marked.parse(text) : text;
      
      msgDiv.appendChild(bubble);
      chatBox.appendChild(msgDiv);
      
      // Scroll to bottom
      chatBox.scrollTop = chatBox.scrollHeight;
      return msgDiv;
    }

    function addTypingIndicator() {
      let chatBox = document.getElementById("chatBox");
      
      let msgDiv = document.createElement("div");
      msgDiv.className = "message ai";
      msgDiv.id = "typing-indicator-" + Date.now();
      
      let bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `
        <div class="loading-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      `;
      
      msgDiv.appendChild(bubble);
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      return msgDiv.id;
    }

    function removeMessage(id) {
      let el = document.getElementById(id);
      if(el) el.remove();
    }

    function handleKey(event) {
      if (event.key === "Enter") {
        sendMsg();
      }
    }

    async function uploadPdf() {
      let fileInput = document.getElementById("pdfUpload");
      let file = fileInput.files[0];
      if (!file) return;

      addMessage(`Uploading ${file.name}...`, "user");
      let loadingId = addTypingIndicator();

      let formData = new FormData();
      formData.append("file", file);

      try {
        let res = await fetch("/upload_pdf", {
          method: "POST",
          body: formData
        });
        
        let data = await res.json();
        removeMessage(loadingId);
        
        if (res.ok) {
          addMessage(data.message, "ai");
        } else {
          addMessage("⚠️ " + data.error, "ai");
        }
      } catch (error) {
        removeMessage(loadingId);
        addMessage("⚠️ Failed to upload PDF.", "ai");
      }
      
      fileInput.value = ""; // Reset input
    }
  </script>

</body>
</html>
